<!DOCTYPE html>

    <title>DOM Traversal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            /* box-sizing: border-box; */
        }
        body {
            margin: 50px;
            font-family: arial;
            background-color: #cfcbcb;
        }
        .container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            width: 900px;
            margin: auto;
        }
        .card {
            display: inline-block;
            width: 120px;
            padding: 0 80px;
            height: 90px;
            font-size: 10px;
            line-height: 80px;
            border-radius: 10px;
            background-color: #e9f6f7f8;
            margin: 5px;
            position: relative;
            text-align: center;
        }
        .card img {
            float: left;
            margin: 0 10px 0 -80px;
            padding: 5px;
            height: 80px;
            width: 80px;
            border-radius: 20%;
            position: relative;
        }
        .card .nama,
        .card .phone {
            display: block;
            line-height: 20px;
            padding: 0 5px;
        }
        .card .nama {
            margin-left: 20px;
            margin-top: 20px;
            font-size: 17px;
        }
        .card .phone {
            margin-left: 20px;
            margin-top: 5px;
            font-size: 12px;
            color: #aaa;
        }
        .card .close {
            font-size: 24px;
            font-weight: bold;
            color: #311c1c;
            position: absolute;
            top: 0;
            right: 30px;
            cursor: pointer;
        }
        .card:hover .close {
            color: red;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
